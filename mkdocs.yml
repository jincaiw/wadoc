# $schema: https://squidfunk.github.io/mkdocs-material/schema.json

site_name: jason.wa的文档库
site_description: 个人知识库与技术文档 - 网络、Docker、Linux、Mac 教程
site_url: https://docx.mujizi.com
repo_url: https://github.com/jincaiw/wadoc
repo_name: jincaiw/wadoc
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  font: false
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 指南:
      - 关于本站: guide/getting-started.md
      - Markdown 语法: guide/concepts.md
      - 写作规范: guide/best-practices.md
  - 图床搭建:
      - GitHub + PicGo 搭建图床: guide/github-picgo-bed.md
  - Mac 教程:
      - 概述: mac/index.md
      - 系统设置:
          - 初始化配置指南: mac/init-config.md
          - 关闭 SIP 系统保护: mac/disable-sip.md
          - 查看系统 Shell 环境: mac/shell-environment.md
          - 截图保存: mac/screenshot-save.md
      - 软件安装:
          - 安装软件的方式: mac/install-software.md
          - Brew 安装软件清单: mac/brew-software-list.md
          - 常用软件推荐: mac/recommended-software.md
          - 已损坏打不开的解决方法: mac/app-broken-fix.md
      - 开发环境:
          - Git 安装与 GitHub 使用: mac/git-install-guide.md
          - Ruby 版本升级: mac/ruby-upgrade.md
          - Oh My Zsh 安装指南: mac/oh-my-zsh.md
      - 其他:
          - 常用命令: mac/common-commands.md
          - 删除 Microsoft AutoUpdate: mac/remove-mau.md
  - Docker:
      - 概述: docker/index.md
      - 搭建 phpIPAM 管理系统: docker/phpipam.md
      - 搭建 Heimdall 导航页: docker/heimdall.md
  - Linux:
      - 概述: linux/index.md
      - CentOS 添加静态路由: linux/static-route.md
  - 参考:
      - API 参考: reference/api.md
      - 配置说明: reference/configuration.md
  - 关于:
      - 项目介绍: about/intro.md
      - 更新日志: about/changelog.md
